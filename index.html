<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pet Pal 🐾</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>🐾 Pet Pal</h1>
      <button id="themeToggle">🌞 Light Mode</button>
    </header>

    <form id="petForm">
      <input type="text" id="petName" placeholder="Pet Name" required />
      <input type="text" id="petType" placeholder="Pet Type (e.g. Dog, Cat)" required />
      <input type="number" id="petAge" placeholder="Age" required />
      <input type="date" id="petVaccination" placeholder="Next Vaccination Date" required />
      <button type="submit">Add Pet</button>
    </form>

    <h2>My Pets</h2>
    <ul id="petList"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
